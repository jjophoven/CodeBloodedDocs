remote_theme: "mmistakes/minimal-mistakes"

minimal_mistakes_skin: "codeblooded"

title: "Code Blooded Docs"
description: "FTC Team 12649"
logo: "/images/codeblooded.png"

#logo: "/assets/images/logo.png"

plugins:
  - jekyll-include-cache

#header:
#  overlay_image: /assets/images/banner.jpg
#  overlay_filter: 0.5

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

footer:
  links:
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/code.blooded.ftc"
    - label: "FTCodeSim"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/jjophoven/FTCodeSim"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/BeepBot99/CodeBloodedDecodeV3"
  since: "2026"


author:
  name             : "Code Blooded"
  avatar           : "/images/codeblooded.png"
  location         : "Minneapolis, MN"